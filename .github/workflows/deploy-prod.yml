# Deploy to Production - Controlled deployment with approval required
# This workflow requires:
# 1. Manual trigger (workflow_dispatch)
# 2. Confirmation input (type DEPLOY)
# 3. Tests passing on main branch
# 4. Approval via GitHub environment protection rules

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

env:
  PROD_URL: https://recruiting-compass-web-a9wx.vercel.app

jobs:
  # Step 1: Verify deployment confirmation
  pre-deploy-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify deployment confirmation
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$CONFIRM_INPUT" != "DEPLOY" ]; then
            echo "❌ Deployment cancelled - confirmation mismatch"
            echo "You must type 'DEPLOY' exactly to confirm"
            exit 1
          fi
          echo "✅ Production deployment confirmed"

      - name: Verify branch is main
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$GIT_REF" != "refs/heads/main" ]; then
            echo "❌ Can only deploy from 'main' branch"
            echo "Current branch: $GIT_REF_NAME"
            exit 1
          fi
          echo "✅ Deploying from main branch"

  # Step 2: Run tests to ensure nothing is broken
  verify:
    name: Verify Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Prepare Nuxt
        run: npx nuxi prepare

      - name: Run tests
        run: npm run test

  # Step 3: Deploy to production (requires manual approval via GitHub environment)
  deploy:
    name: Deploy to Vercel Production
    needs: [pre-deploy-checks, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: ${{ env.PROD_URL }}
    outputs:
      previous-deployment: ${{ steps.capture-previous.outputs.previous-deployment }}
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Capture previous production deployment (for rollback)
        id: capture-previous
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
        run: |
          PREV=$(vercel list --prod --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" 2>/dev/null \
            | grep -oE 'https://[^[:space:]]+\.vercel\.app' \
            | head -1 || true)
          echo "previous-deployment=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous prod deployment captured: ${PREV:-<none>}"

      - name: Deploy to Vercel Production (prebuilt)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
        run: |
          set -o pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1 | tee deploy.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            echo "Vercel deployment failed (exit $DEPLOY_EXIT)"
            exit "$DEPLOY_EXIT"
          fi
          URL=$(grep -oE 'https://[^[:space:]]+\.vercel\.app' deploy.log | tail -1)
          if [ -z "$URL" ]; then
            echo "No deployment URL captured from Vercel output"
            exit 1
          fi
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

  # Step 4: Smoke test the production deployment
  smoke-test:
    name: Post-Deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Wait for propagation
        run: sleep 10

      - name: Test homepage (SSR)
        id: homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$PROD_URL/")
          ELAPSED=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 "$PROD_URL/")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "elapsed=$ELAPSED" >> $GITHUB_OUTPUT
          echo "Homepage: HTTP $STATUS (${ELAPSED}s)"

      - name: Test CSRF endpoint (API + crypto)
        id: csrf
        run: |
          RESPONSE=$(curl -s --max-time 15 "$PROD_URL/api/csrf-token")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$PROD_URL/api/csrf-token")
          HAS_TOKEN=$(echo "$RESPONSE" | grep -c '"token"' || true)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "has_token=$HAS_TOKEN" >> $GITHUB_OUTPUT
          echo "CSRF endpoint: HTTP $STATUS (token_present=$HAS_TOKEN)"

      - name: Test login page (auth routing)
        id: login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -L "$PROD_URL/login")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Login page: HTTP $STATUS"

      - name: Evaluate and report
        env:
          HOMEPAGE_STATUS: ${{ steps.homepage.outputs.status }}
          HOMEPAGE_ELAPSED: ${{ steps.homepage.outputs.elapsed }}
          CSRF_STATUS: ${{ steps.csrf.outputs.status }}
          CSRF_HAS_TOKEN: ${{ steps.csrf.outputs.has_token }}
          LOGIN_STATUS: ${{ steps.login.outputs.status }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED=false
          DETAILS=""

          [ "$HOMEPAGE_STATUS" != "200" ] && FAILED=true && DETAILS="${DETAILS}- \`/\`: HTTP $HOMEPAGE_STATUS (expected 200)\n"
          { [ "$CSRF_STATUS" != "200" ] || [ "$CSRF_HAS_TOKEN" != "1" ]; } && \
            FAILED=true && DETAILS="${DETAILS}- \`/api/csrf-token\`: HTTP $CSRF_STATUS, token_in_body=$CSRF_HAS_TOKEN\n"
          [ "$LOGIN_STATUS" != "200" ] && FAILED=true && DETAILS="${DETAILS}- \`/login\`: HTTP $LOGIN_STATUS (expected 200)\n"

          if [ "$FAILED" = "true" ]; then
            echo "❌ Smoke test FAILED"
            printf '%b\n' "$DETAILS"
            SHORT_SHA="${COMMIT_SHA:0:7}"
            BODY="## Production Smoke Test Failed

          **Commit:** $COMMIT_SHA
          **Run:** $RUN_URL

          ### Failed checks
          $(printf '%b' "$DETAILS")
          ### All results
          | Endpoint | Status |
          |---|---|
          | \`/\` | HTTP $HOMEPAGE_STATUS ($HOMEPAGE_ELAPSED s) |
          | \`/api/csrf-token\` | HTTP $CSRF_STATUS (token: $CSRF_HAS_TOKEN) |
          | \`/login\` | HTTP $LOGIN_STATUS |"
            gh issue create \
              --title "🚨 Production smoke test failed — $SHORT_SHA" \
              --body "$BODY" \
              --label "bug"
            exit 1
          fi
          echo "✅ All smoke tests passed"
          echo "  / → HTTP $HOMEPAGE_STATUS (${HOMEPAGE_ELAPSED}s)"
          echo "  /api/csrf-token → HTTP $CSRF_STATUS"
          echo "  /login → HTTP $LOGIN_STATUS"

  # Step 5: Auto-rollback if smoke test failed
  rollback:
    name: Auto-Rollback on Smoke Failure
    needs: [deploy, smoke-test]
    if: failure() && needs.smoke-test.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Rollback to previous production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
          PREVIOUS_DEPLOYMENT: ${{ needs.deploy.outputs.previous-deployment }}
        run: |
          if [ -z "$PREVIOUS_DEPLOYMENT" ]; then
            echo "No previous deployment captured — falling back to 'vercel rollback' latest"
            vercel rollback --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --yes
          else
            echo "Rolling back production to: $PREVIOUS_DEPLOYMENT"
            vercel rollback "$PREVIOUS_DEPLOYMENT" \
              --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --yes
          fi

      - name: Notify Slack - Rollback executed
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "⏪ Production auto-rolled back after smoke test failure",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*⏪ Auto-Rollback Executed*\nSmoke test failed — production rolled back to previous deployment automatically.\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                }
              }]
            }

  # Step 7: Notify success
  notify-success:
    name: Notify Slack - Deployment Success
    if: success()
    needs: [deploy, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Production Deployment Successful",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*🚀 Production Deployment Successful*\n*Repository:* ${{ github.repository }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}\n*URL:* ${{ env.PROD_URL }}"
                }
              }]
            }

  # Step 8: Notify failure
  notify-failure:
    name: Notify Slack - Deployment Failed
    if: failure()
    needs: [deploy, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 Production Deployment Failed - URGENT",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*🚨 Production Deployment Failed (URGENT)*\n*Repository:* ${{ github.repository }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                }
              }]
            }
