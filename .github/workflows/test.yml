name: Test & Verify

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  # Coverage thresholds are enforced by vitest.config.ts.
  NODE_VERSION: "24"

jobs:
  # Step 1: Lint and type-check
  quality:
    name: Code Quality (Lint & Types)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Token audit (no hardcoded CSS values)
        run: npm run audit:tokens:ci

  # Step 2: Unit and integration tests with coverage
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxi prepare

      - name: Run tests with coverage (thresholds enforced by vitest.config.ts)
        run: npm run test:coverage

  # Note: Accessibility testing is available via "npm run test:a11y" locally
  # CI/CD integration coming after more pages are covered with a11y fixes

  # Step 3: Deploy to Staging (only on develop branch)
  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Pinned to match deploy-prod.yml — Vercel CLI runs on the same Node
          # version in both pipelines. Unit/lint jobs above still use NODE_VERSION.
          node-version: "20"

      - run: npm install -g vercel

      - name: Deploy to Vercel Staging
        id: deploy
        run: |
          set -o pipefail
          vercel deploy --yes --token="$VERCEL_TOKEN" 2>&1 | tee deploy.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            echo "Vercel deployment failed (exit $DEPLOY_EXIT)"
            exit "$DEPLOY_EXIT"
          fi
          URL=$(grep -oP 'https://[^\s]+\.vercel\.app' deploy.log | tail -1)
          if [ -z "$URL" ]; then
            echo "No deployment URL captured from Vercel output"
            exit 1
          fi
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "Successfully deployed to: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      - name: Verify deployment
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$URL" ]; then
            echo "No deployment URL found"
            exit 1
          fi
          echo "Deployment verified: $URL"

  # Step 4: Smoke E2E against the live staging URL (auth-enforcement only — no storageState needed)
  staging-smoke-e2e:
    name: Staging Smoke E2E
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against staging URL
        run: npx playwright test --grep "@smoke" --project chromium
        env:
          BASE_URL: ${{ needs.deploy-staging.outputs.deployment-url }}
          CI: true
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NUXT_ADMIN_TOKEN_SECRET: ${{ secrets.NUXT_ADMIN_TOKEN_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-smoke-report
          path: playwright-report/
          retention-days: 7

  # Step 5: Lighthouse CI against the live staging URL
  lighthouse:
    name: Lighthouse CI
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Lighthouse CI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Run Lighthouse CI collect
        run: npx lhci collect --config=lighthouserc.cjs
        env:
          LHCI_BASE_URL: ${{ needs.deploy-staging.outputs.deployment-url }}
          LHCI_CI_EMAIL: ${{ secrets.LHCI_CI_EMAIL }}
          LHCI_CI_PASSWORD: ${{ secrets.LHCI_CI_PASSWORD }}
          LHCI_PROFILE_SLUG: ${{ secrets.LHCI_PROFILE_SLUG }}

      - name: Run Lighthouse CI upload
        run: npx lhci upload --config=lighthouserc.cjs

      - name: Post Slack report
        run: node scripts/lhci-slack-report.js
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Upload HTML reports as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-${{ github.sha }}
          path: .lighthouseci/
          retention-days: 7

  # Step 6: Notify on failure
  notify-failure:
    name: Notify Slack on Failure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always() && (needs.quality.result == 'failure' || needs.test.result == 'failure' || (github.event_name == 'push' && (needs.deploy-staging.result == 'failure' || needs.staging-smoke-e2e.result == 'failure')))
    needs: [quality, test, deploy-staging, staging-smoke-e2e]

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Failed*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Details>"
                  }
                }
              ]
            }

  # Step 7: Notify on success
  notify-success:
    name: Notify Slack on Success
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always() && needs.quality.result == 'success' && needs.test.result == 'success' && (github.event_name == 'pull_request' || (needs.deploy-staging.result == 'success' && needs.staging-smoke-e2e.result == 'success'))
    needs: [quality, test, deploy-staging, staging-smoke-e2e]

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Pipeline Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Passed*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
