name: Test & Verify

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 75
  NODE_VERSION: "20"

jobs:
  # Step 1: Lint and type-check
  quality:
    name: Code Quality (Lint & Types)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # Step 2: Unit and integration tests with coverage
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npx nuxi prepare

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage thresholds
        run: |
          # Extracts coverage percentages from lcov.info
          COVERAGE=$(grep -A 2 'BRH' coverage/lcov.info | tail -1 | grep -oP '\d+(?=,)' | head -1)
          echo "Coverage: $COVERAGE%"
          if [ "$COVERAGE" -lt ${{ env.COVERAGE_THRESHOLD }} ]; then
            echo "Coverage below ${{ env.COVERAGE_THRESHOLD }}% threshold (got $COVERAGE%)"
            exit 1
          fi
          echo "Coverage meets ${{ env.COVERAGE_THRESHOLD }}% threshold"

  # Note: Accessibility testing is available via "npm run test:a11y" locally
  # CI/CD integration coming after more pages are covered with a11y fixes

  # Step 3: Deploy to Staging (only on develop branch)
  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install -g vercel

      - name: Deploy to Vercel Staging
        id: deploy
        run: |
          OUTPUT=$(vercel deploy --token="${{ secrets.VERCEL_TOKEN }}" 2>&1)
          echo "$OUTPUT"
          if [ $? -ne 0 ]; then
            echo "Vercel deployment failed"
            exit 1
          fi
          if echo "$OUTPUT" | grep -q "ERROR"; then
            echo "Deployment contains errors"
            exit 1
          fi
          URL=$(echo "$OUTPUT" | grep -oP '(?<=https://)[^ ]+' | head -1)
          echo "deployment-url=https://$URL" >> $GITHUB_OUTPUT
          echo "Successfully deployed to: https://$URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      - name: Verify deployment
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$URL" ]; then
            echo "No deployment URL found"
            exit 1
          fi
          echo "Deployment verified: $URL"

  # Step 4: Smoke E2E against the live staging URL (auth-enforcement only — no storageState needed)
  staging-smoke-e2e:
    name: Staging Smoke E2E
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against staging URL
        run: npx playwright test --grep "@smoke" --project chromium
        env:
          BASE_URL: ${{ needs.deploy-staging.outputs.deployment-url }}
          CI: true
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NUXT_ADMIN_TOKEN_SECRET: ${{ secrets.NUXT_ADMIN_TOKEN_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-smoke-report
          path: playwright-report/
          retention-days: 7

  # Step 5: Notify on failure
  notify-failure:
    name: Notify Slack on Failure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always() && (needs.quality.result == 'failure' || needs.test.result == 'failure' || (github.event_name == 'push' && (needs.deploy-staging.result == 'failure' || needs.staging-smoke-e2e.result == 'failure')))
    needs: [quality, test, deploy-staging, staging-smoke-e2e]

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Failed*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Details>"
                  }
                }
              ]
            }

  # Step 6: Notify on success
  notify-success:
    name: Notify Slack on Success
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always() && needs.quality.result == 'success' && needs.test.result == 'success' && (github.event_name == 'pull_request' || (needs.deploy-staging.result == 'success' && needs.staging-smoke-e2e.result == 'success'))
    needs: [quality, test, deploy-staging, staging-smoke-e2e]

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Pipeline Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Passed*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
