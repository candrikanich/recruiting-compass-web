name: Security Scanning

on:
  # Only run on PRs to main (production gate)
  pull_request:
    branches: [main]
  # Run daily to catch newly disclosed vulnerabilities
  schedule:
    - cron: "0 6 * * *"
  # Allow manual triggering from Actions tab
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # Job 1: Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        run: |
          # Run audit and capture results
          npm audit --audit-level=moderate --json > audit-results.json || true

          # Parse results
          VULNERABILITIES=$(jq '.metadata.vulnerabilities.total' audit-results.json)
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-results.json)
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-results.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate' audit-results.json)

          echo "total=$VULNERABILITIES" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT

          # Display summary
          echo "📊 Vulnerability Summary:"
          echo "  - Critical: $CRITICAL"
          echo "  - High: $HIGH"
          echo "  - Moderate: $MODERATE"
          echo "  - Total: $VULNERABILITIES"

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-results
          path: audit-results.json
          retention-days: 30

      - name: Fail on critical or high vulnerabilities
        if: steps.npm-audit.outputs.critical > 0 || steps.npm-audit.outputs.high > 0
        run: |
          echo "❌ Found ${{ steps.npm-audit.outputs.critical }} critical and ${{ steps.npm-audit.outputs.high }} high severity vulnerabilities"
          echo "Run 'npm audit fix' to resolve automatically fixable issues"
          exit 1

  # Job 2: SAST with CodeQL (GitHub's native solution)
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          # Continue even if some files have parsing issues
          upload-as-artifact: false

  # Job 3: Secret scanning (GitHub's native - catches secrets in code)
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for comprehensive scan

      - name: Check PR has new commits
        id: sha-check
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$BASE_SHA" = "$HEAD_SHA" ]; then
            echo "has_diff=false" >> $GITHUB_OUTPUT
            echo "PR base and head are the same commit — skipping diff scan."
          else
            echo "has_diff=true" >> $GITHUB_OUTPUT
          fi

      - name: TruffleHog Secret Scan (PR diff)
        if: github.event_name == 'pull_request' && steps.sha-check.outputs.has_diff == 'true'
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Skip scan (PR has no new commits)
        if: github.event_name == 'pull_request' && steps.sha-check.outputs.has_diff == 'false'
        run: echo "PR base and head are the same commit — nothing new to scan."

      - name: Get scan base commit (scheduled/manual)
        if: github.event_name != 'pull_request'
        id: scan-base
        run: |
          # Scan commits from the last 7 days; fall back to first commit for new repos
          LOOKBACK=$(git log --before="7 days ago" --format="%H" -1)
          if [ -z "$LOOKBACK" ]; then
            LOOKBACK=$(git rev-list --max-parents=0 HEAD)
          fi
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$LOOKBACK" = "$HEAD_SHA" ]; then
            echo "has_diff=false" >> $GITHUB_OUTPUT
            echo "Base and HEAD are the same commit — no new commits to scan."
          else
            echo "has_diff=true" >> $GITHUB_OUTPUT
            echo "sha=$LOOKBACK" >> $GITHUB_OUTPUT
            echo "Scanning from $LOOKBACK to HEAD"
          fi

      - name: TruffleHog Secret Scan (scheduled/manual)
        if: github.event_name != 'pull_request' && steps.scan-base.outputs.has_diff == 'true'
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          path: ./
          base: ${{ steps.scan-base.outputs.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Skip scan (no new commits)
        if: github.event_name != 'pull_request' && steps.scan-base.outputs.has_diff == 'false'
        run: echo "No new commits since last scan window — nothing to scan."

  # Job 4: License compliance check
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --summary --production \
            --excludePrivatePackages \
            --excludePackages "vaul-vue@0.4.1" \
            --onlyAllow "MIT;ISC;BSD;Apache;Apache-2.0;0BSD;BSD-2-Clause;BSD-3-Clause;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0;CC-BY-4.0;MPL-2.0"

  # Job 5: Notify on security issues
  notify-security-issues:
    name: Notify on Security Issues
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    needs: [dependency-scan, codeql, secret-scan]

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3

        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 Security Scan Failure",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 Security Scan Failed*\n*Repository:* ${{ github.repository }}\n*Scan Type:* Daily Security Scan\n*Branch:* ${{ github.ref_name }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
