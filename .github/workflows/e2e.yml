name: E2E Tests

on:
  # Only run on PRs to main (production gate)
  pull_request:
    branches: [main]
  # Allow manual triggering from Actions tab
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Dependabot PRs don't have access to secrets — the server can't start without them.
    # Dependency bumps are validated by unit tests, lint, and type-check.
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare Nuxt
        run: npx nuxi prepare

      - name: Build application
        run: npm run build
        env:
          # Override Vercel preset so nuxi preview can serve a standard Node.js
          # server in CI. Production builds use the Vercel preset (nuxt.config.ts).
          NITRO_PRESET: node-server

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NUXT_ADMIN_TOKEN_SECRET: ${{ secrets.NUXT_ADMIN_TOKEN_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: test-results/
          retention-days: 30

  # WebKit (Safari) — non-blocking initially; failures are reported but don't gate the PR
  e2e-webkit:
    name: Playwright E2E Tests (WebKit/Safari)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright WebKit browser
        run: npx playwright install --with-deps webkit

      - name: Prepare Nuxt
        run: npx nuxi prepare

      - name: Build application
        run: npm run build
        env:
          NITRO_PRESET: node-server

      - name: Run E2E tests (WebKit only)
        run: npm run test:e2e -- --project webkit
        env:
          CI: true
          FULL_TESTS: "1"
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NUXT_ADMIN_TOKEN_SECRET: ${{ secrets.NUXT_ADMIN_TOKEN_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload WebKit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-webkit-report
          path: playwright-report/
          retention-days: 30
